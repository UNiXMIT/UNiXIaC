- name: Ensure Oracle directory exists
  ansible.builtin.file:
    path: /opt/oracle
    state: directory
    mode: '0755'

- name: Set Oracle variables
  ansible.builtin.set_fact:
    oracle_base_url: "https://download.oracle.com/otn_software/linux/instantclient/2326000/"
    oracle_precomp_url: "https://mturner.s3.eu-west-2.amazonaws.com/Public/Oracle/InstantClient/23/"
    oracle_version: "23.26.0.0.0"
    base_dir: "instantclient_23_0"
    oracle_packages:
      - name: basic
        file: "instantclient-basic-linux.x64-23.26.0.0.0.zip"
        url: "{{ oracle_base_url }}"
      - name: odbc
        file: "instantclient-odbc-linux.x64-23.26.0.0.0.zip"
        url: "{{ oracle_base_url }}"
      - name: sqlplus
        file: "instantclient-sqlplus-linux.x64-23.26.0.0.0.zip"
        url: "{{ oracle_base_url }}"
      - name: sdk
        file: "instantclient-sdk-linux.x64-23.26.0.0.0.zip"
        url: "{{ oracle_base_url }}"
      - name: precomp
        file: "instantclient-precomp-linux.x64-23.26.0.0.0.zip"
        url: "{{ oracle_precomp_url }}"

- name: Download Oracle packages
  ansible.builtin.get_url:
    url: "{{ item.url }}{{ item.file }}"
    dest: "/opt/oracle/{{ item.file }}"
    mode: '0644'
  register: download_result
  retries: 5
  delay: 30
  until: download_result is succeeded
  loop: "{{ oracle_packages }}"
  loop_control:
    label: "{{ item.name }}"

- name: Extract Oracle packages
  ansible.builtin.unarchive:
    src: "/opt/oracle/{{ item.file }}"
    dest: /opt/oracle
    remote_src: yes
    creates: "/opt/oracle/{{ base_dir }}"
  loop: "{{ oracle_packages }}"
  loop_control:
    label: "{{ item.name }}"

- name: Ensure correct permissions on /opt/oracle
  ansible.builtin.file:
    path: /opt/oracle
    state: directory
    recurse: yes
    mode: '0755'

- name: Configure Oracle environment
  ansible.builtin.copy:
    dest: /etc/profile.d/oracle.sh
    mode: '0755'
    content: |
      #!/bin/bash
      export ORACLE_HOME=/opt/oracle/{{ base_dir }}
      export PATH=$PATH:$ORACLE_HOME:$ORACLE_HOME/sdk
      export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:$ORACLE_HOME

- name: Configure Oracle ODBC DSN
  ansible.builtin.blockinfile:
    path: /etc/odbc.ini
    marker: "# {mark} ANSIBLE MANAGED BLOCK Oracle"
    block: |
      [oracle]
      Description = Oracle ODBC Connection
      Driver      = /opt/oracle/{{ base_dir }}/libsqora.so.21.1
      Database    = {{ myUsername }}
      Servername  = 127.0.0.1:1521/FREE
      UserID      = {{ myUsername }}