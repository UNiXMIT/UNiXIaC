- name: Reboot EC2 Instance
  hosts: 'SEM{{ semaphore_vars.task_details.id }}'
  gather_facts: no
  become: yes
  tasks:
  - name: Reboot
    reboot:
  tags: default

- name: AWS EC2 Management Complete
  hosts: local
  gather_facts: no
  tasks:
    - name: AWS EC2 instance Configuration Complete
      amazon.aws.ec2_tag:
        # aws_profile: '{{ awsProfile }}'
        region: '{{ awsRegion }}'
        resource: '{{ item }}'
        tags:
          SemStatus: 'Ready'
        state: present
      loop: '{{ ec2.instance_ids }}'
  tags: default

- name: Final tasks
  hosts: local
  gather_facts: no
  tasks: 
  - name: Import final.yml
    import_tasks: final.yml
  tags: default