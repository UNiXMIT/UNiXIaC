- name: AWS Initial Configuration
  hosts: local
  gather_facts: no
  tasks:
  - name: Import initial.yml
    import_tasks: initial.yml
  tags: default

- name: AWS AMI Info
  hosts: local
  gather_facts: no
  tasks:
  - name: Import ami.yml
    import_tasks: ami.yml

- name: AWS EC2 Management
  hosts: local
  gather_facts: no
  tasks:
    - block:
        - name: Import aws.yml
          import_tasks: aws.yml
      rescue: 
        - name: Import fail.yml
          import_tasks: fail.yml
  tags: default

- name: Modify OS Config
  hosts: 'SEM{{ semaphore_vars.task_details.id }}'
  gather_facts: no
  become: yes
  tasks:
  - name: Import system.yml
    import_tasks: system.yml
  tags: default

- name: Manage Users
  hosts: 'SEM{{ semaphore_vars.task_details.id }}'
  gather_facts: no
  become: yes
  tasks: 
  - name: Import users.yml
    import_tasks: users.yml
  no_log: True
  tags: default

