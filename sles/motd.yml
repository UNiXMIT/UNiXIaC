- name: Delete original MOTD
  file:
    path: /etc/motd
    state: absent
    
- name: Create new MOTD
  copy:
    dest: "/etc/motd"
    content: |
      ****************************************************************************************************

          {{ ansible_facts.distribution }} {{ ansible_facts.distribution_version}}

          AcuCOBOL
            Set Environment:
              . setenvacu.sh (-h for usage)
              Note: Run once before using systemctl services.
                
              sudo systemctl (start|stop|restart|status|enable) (acurcl|atw|acuserver|acuxdbcs|boomerang)

          MFCOBOL
            Set Environment:
              . setenvmf.sh
              Note: Run once before using systemctl services.

              sudo systemctl (start|stop|restart|status|enable) (escwa|mfds|fileshare|hacloud)

            Install Options:
              -IacceptEULA -ESadminID={{ myUsername }} -il=/home/products/edXXpuXX

      ****************************************************************************************************
      