- name: Package installation
  package:
    name:
      - unixODBC
      - wget
      - curl
      - cronie
      - dos2unix
      - htop
      - tcpdump
      - tmux
      - openconnect
      - podman
      - buildah
    state: present
  register: result
  retries: 5
  delay: 30
  until: result is not failed