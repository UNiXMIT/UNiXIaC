- name: Install EPEL
  package:
    name: 'https://mirror.init7.net/fedora/epel/epel-release-latest-{{ ansible_facts.distribution_major_version }}.noarch.rpm'
    state: present
    disable_gpg_check: yes
  register: result
  retries: 5
  delay: 30
  until: result is not failed

- name: Package installation
  package:
    name:
      - unixODBC
      - wget
      - curl
      - cronie
      - dos2unix
      - htop
      - tcpdump
      - tmux
      - openconnect
      - podman
      - buildah
    state: present
  register: result
  retries: 5
  delay: 30
  until: result is not failed