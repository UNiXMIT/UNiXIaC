- name: Set Facts
  set_fact:
    DBSHORT: 

- name: Install EPEL
  package:
    name: 'https://dl.fedoraproject.org/pub/epel/epel-release-latest-{{ ansible_facts.distribution_major_version }}.noarch.rpm'
    state: present
    disable_gpg_check: yes
  register: result
  retries: 5
  delay: 30
  until: result is not failed

