  gather_facts: no
  tasks:
  - name: Import ami.yml
    import_tasks: ami.yml

- name: AWS EC2 Management
  hosts: local
  gather_facts: no
  tasks:
    - block:
        - name: Import aws.yml
          import_tasks: aws.yml
      rescue: 
        - name: Import fail.yml
          import_tasks: fail.yml
  tags: default

