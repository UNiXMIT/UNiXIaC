- name: Get {{ installerName }} Download URL from S3
  amazon.aws.s3_object:
    # profile: '{{ awsProfile }}'
    bucket: mturner
    mode: geturl
    object: '{{ S3Prefix }}{{ installerName }}'
    region: eu-west-2
    expiry: 4000
    sig_v4: true
  register: s3
  delegate_to: localhost

- name: Get SafeNet License Download URL from S3
  amazon.aws.s3_object:
    # profile: '{{ awsProfile }}'
    bucket: mturner
    mode: geturl
    object: ED/Licenses/lservrc.net
    region: eu-west-2
    expiry: 4000
    sig_v4: true
  register: s3sn
  delegate_to: localhost
    
- name: Get AutoPass License Download URL from S3
  amazon.aws.s3_object:
    # profile: '{{ awsProfile }}'
    bucket: mturner
    mode: geturl
    object: ED/Licenses/LicFile.txt
    region: eu-west-2
    expiry: 4000
    sig_v4: true
  register: s3ap
  delegate_to: localhost

- name: Download {{ installerName }}
  ansible.builtin.get_url:
    url: '{{ s3.url }}'
    dest: "/home/{{ myUsername }}/MFSupport/MFInstallers/"
    owner: '{{ myUsername }}' 
    group: '{{ myUsername }}'
    mode: '0775'
  register: result
  retries: 5
  delay: 30
  until: result is not failed

- name: Download SafeNet License
  ansible.builtin.get_url:
    url: '{{ s3sn.url }}'
    dest: /tmp
    owner: '{{ myUsername }}' 
    group: '{{ myUsername }}'
    mode: '0775'
  when: edVer | int <= 90
  register: result
  retries: 5
  delay: 30
  until: result is not failed

- name: Download AutoPass License
  ansible.builtin.get_url:
    url: '{{ s3ap.url }}'
    dest: /tmp
    owner: '{{ myUsername }}' 
    group: '{{ myUsername }}'
    mode: '0775'
  when: edVer | int >= 80
  register: result
  retries: 5
  delay: 30
  until: result is not failed

- name: Add ED Tags
  amazon.aws.ec2_tag:
    # aws_profile: '{{ awsProfile }}'
    region: "{{ hostvars['localhost']['awsRegion'] }}"
    resource: '{{ item }}'
    tags:
      Name: "{{ semaphore_vars.task_details.username|upper }}-{{ imageName }} {{ productName }}"
      ED: '{{ installerName }}'
    state: present
  loop: "{{ hostvars['localhost'].ec2.instance_ids }}"
  delegate_to: localhost
  when: "'arm' not in ansible_run_tags"

- name: Add ED Tags ARM
  amazon.aws.ec2_tag:
    # aws_profile: '{{ awsProfile }}'
    region: "{{ hostvars['localhost']['awsRegion'] }}"
    resource: '{{ item }}'
    tags:
      Name: "{{ semaphore_vars.task_details.username|upper }}-{{ imageName }}-ARM {{ productName }}"
      ED: '{{ installerName }}'
    state: present
  loop: "{{ hostvars['localhost'].ec2.instance_ids }}"
  delegate_to: localhost
  when: "'amd' not in ansible_run_tags"

- name: Install {{ installerName }}
  command: './{{ installerName }} -IacceptEULA -ESadminID={{ myUsername }} -il={{ installPath }}'
  args:
    chdir: /home/{{ myUsername }}/MFSupport/MFInstallers
  become: yes

- name: Install Safenet License File
  shell: mv /tmp/lservrc.net /var/microfocuslicensing/bin/lservrc.net
  when: edVer | int <= 90
  become: yes

- name: Install AutoPass License File
  shell: mv /tmp/LicFile.txt /opt/microfocus/licensing/autopass/clientdetails/data/LicFile.txt
  when: edVer | int >= 80 and edVer | int <= 100
  become: yes

- name: Install RocketPass License File
  shell: mv /tmp/LicFile.txt /opt/rocketsoftware/licensing/rocketpass/clientdetails/data/LicFile.txt
  when: edVer | int >= 110
  become: yes

- name: Start MFDS
  shell: |
    . /home/{{ myUsername }}/MFSupport/MFScripts/setenvmf.sh 1
    systemctl start mfds
  become: yes

- name: Pause for 10 seconds
  ansible.builtin.pause:
    seconds: 10

- name: Set SYSAD in VSAM ESM
  shell: '. {{ installPath }}/bin/cobsetenv ; {{ installPath }}/bin/mfsecconv reset --user SYSAD --pass SYSAD'
  become: yes
  when: edVer | int >= 100

- name: Set SYSAD in Vault
  shell: . {{ installPath }}/bin/cobsetenv ; {{ installPath }}/bin/mfsecretsadmin write microfocus/temp/admin -overwrite '{"mfUser":"SYSAD", "mfPassword":"SYSAD"}'
  become: yes
  when: edVer | int >= 100

- name: Set SYSAD in HACloud escwacreds
  shell: . {{ installPath }}/bin/cobsetenv ; {{ installPath }}/bin/mfsecretsadmin write microfocus/hacloud/escwacreds -overwrite '{"mfUser":"SYSAD", "mfPassword":"SYSAD"}'
  become: yes
  when: edVer | int >= 100

- name: Set SYSAD in HACloud mfdscreds
  shell: . {{ installPath }}/bin/cobsetenv ; {{ installPath }}/bin/mfsecretsadmin write microfocus/hacloud/mfdscreds -overwrite '{"mfUser":"SYSAD", "mfPassword":"SYSAD"}'
  become: yes
  when: edVer | int >= 100

- name: Import JCL Region XML
  shell: '. {{ installPath }}/bin/cobsetenv ; {{ installPath }}/bin/mfds64 -g 5 /home/{{ myUsername }}/MFSupport/MFSamples/JCL/JCL.xml D SYSAD SYSAD'
  when: edVer | int <= 90

- name: Import JCL Region XML w/RFA
  shell: '. {{ installPath }}/bin/cobsetenv ; {{ installPath }}/bin/mfds64 -g 5 /home/{{ myUsername }}/MFSupport/MFSamples/JCL/JCLRFA.xml D SYSAD SYSAD'
  when: edVer | int >= 100 and edVer | int <= 110

- name: Import JCL Region JSON
  shell: '. {{ installPath }}/bin/cobsetenv ; {{ installPath }}/bin/mfds64 -g 5 /home/{{ myUsername }}/MFSupport/MFSamples/JCL/JCL.json D SYSAD SYSAD'
  when: edVer | int >= 120

- name: Import CICS Region XML
  shell: '. {{ installPath }}/bin/cobsetenv ; {{ installPath }}/bin/mfds64 -g 5 /home/{{ myUsername }}/MFSupport/MFSamples/CICS/CICS.xml D SYSAD SYSAD'
  when: edVer | int <= 90

- name: Import CICS Region XML w/RFA
  shell: '. {{ installPath }}/bin/cobsetenv ; {{ installPath }}/bin/mfds64 -g 5 /home/{{ myUsername }}/MFSupport/MFSamples/CICS/CICSRFA.xml D SYSAD SYSAD'
  when: edVer | int >= 100 and edVer | int <= 110

- name: Import CICS Region JSON
  shell: '. {{ installPath }}/bin/cobsetenv ; {{ installPath }}/bin/mfds64 -g 5 /home/{{ myUsername }}/MFSupport/MFSamples/CICS/CICS.json D SYSAD SYSAD'
  when: edVer | int >= 120

- name: Copy DFHDRDAT into CICS System Directory
  ansible.builtin.copy:
    src: '{{ installPath }}/etc/cas/dfhdrdat'
    dest: /home/{{ myUsername }}/MFSupport/MFSamples/CICS/system/dfhdrdat
    mode: '0775'
    remote_src: yes

- name: Import IMS Region XML
  shell: '. {{ installPath }}/bin/cobsetenv ; {{ installPath }}/bin/mfds64 -g 5 /home/{{ myUsername }}/MFSupport/MFSamples/IMS/IMS.xml D SYSAD SYSAD'
  when: edVer | int <= 90

- name: Import IMS Region XML w/RFA
  shell: '. {{ installPath }}/bin/cobsetenv ; {{ installPath }}/bin/mfds64 -g 5 /home/{{ myUsername }}/MFSupport/MFSamples/IMS/IMSRFA.xml D SYSAD SYSAD'
  when: edVer | int >= 100 and edVer | int <= 110

- name: Import IMS Region JSON
  shell: '. {{ installPath }}/bin/cobsetenv ; {{ installPath }}/bin/mfds64 -g 5 /home/{{ myUsername }}/MFSupport/MFSamples/IMS/IMS.json D SYSAD SYSAD'
  when: edVer | int >= 120

- name: Copy DFHDRDAT into IMS System Directory
  ansible.builtin.copy:
    src: '{{ installPath }}/etc/cas/dfhdrdat'
    dest: /home/{{ myUsername }}/MFSupport/MFSamples/IMS/system/dfhdrdat
    mode: '0775'
    remote_src: yes

- name: Copy IMS MFDEMO Files
  ansible.builtin.command:
    cmd: cp -a {{ installPath }}/demo/ims/ivp64/. /home/{{ myUsername }}/MFSupport/MFSamples/IMS/mfdemo/

- name: Modify mf-server.dat
  ansible.builtin.blockinfile:
    path: '{{ installPath }}/etc/mf-server.dat'
    marker: "; {mark} ANSIBLE MANAGED BLOCK"
    block: |
      [JCL/SSL/passphrases]
      certificate=""
      keyfile=""

      [Web Services and J2EE/SSL/passphrases]
      certificate=""
      keyfile=""

      [Web/SSL/passphrases]
      certificate=""
      keyfile=""

      [TN3270/SSL/passphrases]
      certificate=""
      keyfile=""

      [RFA/SSL/passphrases]
      certificate=""
      keyfile=""

- name: Cleanup
  ansible.builtin.file:
    path: /tmp/.mf.env
    state: absent
  become: yes