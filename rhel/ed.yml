- name: Import CICS Region XML
  shell: '. {{ installPath }}/bin/cobsetenv ; {{ installPath }}/bin/mfds64 -g 5 /home/{{ myUsername }}/MFSupport/MFSamples/CICS/CICS.xml D SYSAD SYSAD'
  when: edVer | int <= 90

- name: Import CICS Region JSON
  block:
    - name: ESCWA Login
      ansible.builtin.uri:
        url: http://localhost:10086/logon
        method: POST
        body_format: json
        body: |
          {
            "mfUser": "SYSAD",
            "mfPassword": "SYSAD"
          }
        headers:
          accept: application/json
          X-Requested-With: API
          Origin: http://localhost:10086
      register: loginResponse
    
    - name: Read CICS.json File
      ansible.builtin.slurp:
        src: /home/{{ myUsername }}/MFSupport/MFSamples/CICS/CICS.json
      register: cics_json
    
    - name: Import CICS Region JSON
      ansible.builtin.uri:
        url: http://localhost:10086/native/v1/import/127.0.0.1/86
        method: POST
        body_format: json
        body: "{{ cics_json.content | b64decode | to_json }}"
        headers:
          accept: application/json
          X-Requested-With: API
          Cookie: "{{ loginResponse.set_cookie | default('') }}"
          Origin: http://localhost:10086
  when: edVer | int >= 100

- name: Copy DFHDRDAT
  ansible.builtin.copy:
    src: '{{ installPath }}/etc/cas/dfhdrdat'
    dest: /home/{{ myUsername }}/MFSupport/MFSamples/CICS/system/dfhdrdat
    mode: '0775'
    remote_src: yes

- name: Modify mf-server.dat
  ansible.builtin.blockinfile:
    path: '{{ installPath }}/etc/mf-server.dat'
    block: |
      [JCL/SSL/passphrases]
      certificate=""
      keyfile=""

      [Web Services and J2EE/SSL/passphrases]
      certificate=""
      keyfile=""

      [Web/SSL/passphrases]
      certificate=""
      keyfile=""

      [TN3270/SSL/passphrases]
      certificate=""
      keyfile=""

      [RFA/SSL/passphrases]
      certificate=""
      keyfile=""

- name: Cleanup
  ansible.builtin.file:
    path: /tmp/.mf.env
    state: absent
  become: yes