    state: present
  ignore_errors: true

- name: Create enableClink script
  win_copy:
    content: |
      @ECHO OFF
      choco install -y clink-maintained
      setx /m PATH "C:\Program Files (x86)\clink;%PATH%"
      "C:\Program Files (x86)\clink\clink" autorun -a install
      "C:\Program Files (x86)\clink\clink" set clink.logo none
    dest: C:\Windows\enableClink.cmd

- name: Create a shortcut to ADExplorer
  community.windows.win_shortcut:
    src: C:\ProgramData\chocolatey\bin\ADexplorer64.exe
    dest: C:\ProgramData\Microsoft\Windows\Start Menu\ADExplorer.lnk

- name: Install New Windows Terminal
  ansible.windows.win_powershell:
    script: |
      $msTermVer = "1.24.10921.0"
      $msTermURL = "https://github.com/microsoft/terminal/releases/download/v${msTermVer}/Microsoft.WindowsTerminal_${msTermVer}_x64.zip"
      Invoke-WebRequest -Uri $msTermURL -outfile C:\Users\Public\Documents\Microsoft.WindowsTerminal.zip
      Expand-Archive -LiteralPath C:\Users\Public\Documents\Microsoft.WindowsTerminal.zip -DestinationPath C:\Users\Public\Documents
      setx /m PATH "$env:PATH;C:\Users\Public\Documents\terminal-${msTermVer}"
  ignore_errors: true
  tags: [ wins2019, wins2022]