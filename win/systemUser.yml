- name: Show Hidden Files/Folders
  win_regedit:
    path: HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\Advanced
    name: Hidden 
    data: 1
    type: dword

- name: Show File Extensions
  win_regedit:
    path: HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\Advanced
    name: HideFileExt
    data: 0
    type: dword

- name: Add folders to QuickAccess
  ansible.windows.win_powershell:
    script: |
      $o = new-object -com shell.application
      $o.Namespace('C:\temp').Self.InvokeVerb("pintohome")
      $o.Namespace('C:\AcuSamples').Self.InvokeVerb("pintohome")
      $o.Namespace('C:\AcuScripts').Self.InvokeVerb("pintohome")
      $o.Namespace('C:\AcuSupport').Self.InvokeVerb("pintohome")
      $o.Namespace('C:\etc').Self.InvokeVerb("pintohome")
      $o.Namespace('C:\MFSamples').Self.InvokeVerb("pintohome")
      $o.Namespace('C:\MFScripts').Self.InvokeVerb("pintohome")
      $o.Namespace('C:\MFSupport').Self.InvokeVerb("pintohome")
      $o.Namespace('C:\CTF').Self.InvokeVerb("pintohome")

- name: Install SSH Public Key
  ansible.windows.win_powershell:
    script: |
      $pubKey = "ssh-rsa  support"
      $sshDir = "C:\Users\$env:USERNAME\.ssh"
      $sshDirAdmin = "C:\ProgramData\ssh\"
      New-Item -ItemType Directory -Path $sshDir -Force
      New-Item -ItemType Directory -Path $sshDir -Force
      $authKeys = "$sshDir\authorized_keys"
      $authKeysAdmin = "$sshDirAdmin\administrators_authorized_keys"
      Add-Content -Path $authKeys -Value $pubKey
      icacls $sshDir /inheritance:r
      icacls $sshDirAdmin /inheritance:r
      icacls $sshDir /grant "$($env:USERNAME):(F)"
      icacls $sshDirAdmin /grant "$($env:USERNAME):(F)"
      icacls $authKeys /inheritance:r
      icacls $authKeysAdmin /inheritance:r
      icacls $authKeys /grant "$($env:USERNAME):(F)"
      icacls $authKeysAdmin /grant "$($env:USERNAME):(F)"