- name: Display Semaphore Variables
  ansible.builtin.debug:
    msg: "{{ semaphore_vars | to_nice_json }}"
  tags: default

- name: AWS Initial Configuration
  hosts: local
  gather_facts: no
  tasks:
  - name: Import initial.yml
    import_tasks: initial.yml
  tags: default

- name: AWS AMI Info
  hosts: local
  gather_facts: no
  tasks:
  - name: Import ami.yml
    import_tasks: ami.yml

- name: AWS EC2 Management
  hosts: local
  gather_facts: no
  tasks:
    - block:
        - name: Import aws.yml
          import_tasks: aws.yml
      rescue: 
        - name: Import fail.yml
          import_tasks: fail.yml
  tags: default

- name: semStatus Update
  hosts: local
  gather_facts: no
  vars:
    semStatus: Optimising Ansible
  tasks:
  - name: Import semStatus.yml
    import_tasks: semStatus.yml
  tags: default

- name: Optimise Ansible on Windows
  hosts: 'SEM{{ semaphore_vars.task_details.id }}'
  gather_facts: no
  tasks:
  - name: Import optimise.yml
    import_tasks: optimise.yml
  tags: default

